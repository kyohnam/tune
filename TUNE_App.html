<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>TUNE</title>
<style>
/* ─────────────────────────────────────────────
   DESIGN TOKENS
───────────────────────────────────────────── */
:root {
  --c-bg:        #08080d;
  --c-s0:        #0e0e16;
  --c-s1:        #151520;
  --c-s2:        #1d1d2c;
  --c-s3:        #252537;
  --c-border:    #2c2c40;
  --c-border-s:  rgba(255,255,255,0.05);
  --c-accent:    #ff3356;
  --c-accent-d:  rgba(255,51,86,0.12);
  --c-accent-g:  rgba(255,51,86,0.35);
  --c-green:     #00d47e;
  --c-text:      #f0f0f5;
  --c-t2:        #9090b0;
  --c-t3:        #55556a;
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --r-f:   9999px;
  --safe-b: env(safe-area-inset-bottom,0px);
  --hdr-h: 60px;
  --ctrl-h: 64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--c-bg);color:var(--c-text);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;
  -webkit-font-smoothing:antialiased;font-size:14px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit}
input{font-family:inherit;font-size:inherit;color:inherit;border:none;outline:none;background:none}
a{color:inherit;text-decoration:none}

/* ─────────────────────────────────────────────
   SCREEN SYSTEM
───────────────────────────────────────────── */
.screen{position:absolute;inset:0;transition:opacity .22s,transform .22s;overflow:hidden}
.screen.off{opacity:0;pointer-events:none;transform:translateY(10px)}

/* ─────────────────────────────────────────────
   SVG ICONS (inline, reusable via <use>)
───────────────────────────────────────────── */

/* ─────────────────────────────────────────────
   ① HOME SCREEN
───────────────────────────────────────────── */
#sHome{
  display:flex;flex-direction:column;
  background:radial-gradient(ellipse 80% 55% at 50% -10%,rgba(255,51,86,.18) 0%,transparent 68%),var(--c-bg);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#sHome::-webkit-scrollbar{display:none}

.home-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:48px 24px 20px;
  position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg,var(--c-bg) 70%,transparent);
}
.brand-mark{
  font-size:24px;font-weight:900;letter-spacing:5px;
  background:linear-gradient(130deg,#fff 30%,var(--c-accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.live-tag{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--c-accent);
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--c-accent);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.3)}}

.home-body{padding:0 24px 32px;display:flex;flex-direction:column;gap:24px}

.headline{font-size:22px;font-weight:800;line-height:1.35;color:var(--c-text)}
.headline em{font-style:normal;color:var(--c-accent)}

/* 검색 */
.search-row{display:flex;gap:8px}
.search-field{
  flex:1;height:48px;padding:0 16px;
  background:var(--c-s2);border:1.5px solid var(--c-border);
  border-radius:var(--r-lg);font-size:15px;color:var(--c-text);
  transition:border-color .2s;-webkit-appearance:none;
}
.search-field:focus{border-color:var(--c-accent)}
.search-field::placeholder{color:var(--c-t3)}
.search-go{
  width:48px;height:48px;border-radius:var(--r-lg);
  background:var(--c-accent);display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;flex-shrink:0;
}
.search-go:active{opacity:.75}
.search-go svg{width:20px;height:20px;fill:white}

/* 키워드 칩 */
.label-xs{font-size:11px;font-weight:700;color:var(--c-t3);letter-spacing:2px;text-transform:uppercase}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.kw-chip{
  padding:7px 14px;border-radius:var(--r-f);
  background:var(--c-s2);border:1px solid var(--c-border);
  font-size:13px;font-weight:600;transition:all .14s;white-space:nowrap;
}
.kw-chip:hover,.kw-chip:active{background:var(--c-accent);border-color:var(--c-accent);color:#fff}

/* 채널 그리드 */
.ch-grid{display:grid;grid-template-columns:1fr;gap:8px}
.ch-tile{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--c-s1);border:1px solid var(--c-border-s);
  border-radius:var(--r-lg);cursor:pointer;transition:all .14s;
  position:relative;overflow:hidden;
}
.ch-tile::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--tile-color,var(--c-accent));
}
.ch-tile:active{background:var(--c-s2)}
.tile-icon{
  width:44px;height:44px;border-radius:var(--r-md);
  background:var(--tile-color-d,var(--c-accent-d));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.tile-icon svg{width:22px;height:22px}
.tile-meta{flex:1;min-width:0}
.tile-name{font-size:14px;font-weight:700;margin-bottom:3px}
.tile-now{font-size:12px;color:var(--c-t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile-badge{
  font-size:9px;font-weight:800;letter-spacing:1px;
  padding:3px 8px;border-radius:var(--r-f);
  background:var(--c-accent-d);color:var(--c-accent);
  border:1px solid rgba(255,51,86,.2);flex-shrink:0;
}

/* ─────────────────────────────────────────────
   ② PLAYER SCREEN
───────────────────────────────────────────── */
#sPlayer{
  display:grid;
  grid-template-rows:var(--hdr-h) 1fr var(--ctrl-h);
  grid-template-columns:1fr;
  background:var(--c-bg);
}

/* 플레이어 헤더 */
.player-hdr{
  display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--c-s0);border-bottom:1px solid var(--c-border-s);
  grid-row:1;overflow:hidden;
}
.icon-btn{
  width:36px;height:36px;border-radius:var(--r-md);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  background:var(--c-s2);border:1px solid var(--c-border-s);
  transition:all .12s;
}
.icon-btn:active,.icon-btn:hover{background:var(--c-s3)}
.icon-btn svg{width:18px;height:18px;fill:var(--c-text)}
.player-logo{
  font-size:18px;font-weight:900;letter-spacing:4px;flex-shrink:0;
  background:linear-gradient(130deg,#fff 30%,var(--c-accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hdr-search-wrap{flex:1;display:flex;gap:8px;min-width:0}
.hdr-search-input{
  flex:1;height:34px;padding:0 14px;min-width:0;
  background:var(--c-s2);border:1px solid var(--c-border);
  border-radius:var(--r-f);font-size:13px;
  transition:border-color .2s;-webkit-appearance:none;
}
.hdr-search-input:focus{border-color:var(--c-accent)}
.hdr-search-input::placeholder{color:var(--c-t3)}
.hdr-search-btn{
  height:34px;padding:0 14px;border-radius:var(--r-f);
  background:var(--c-accent);font-size:13px;font-weight:700;
  white-space:nowrap;transition:opacity .12s;
}
.hdr-search-btn:active{opacity:.8}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-clock{font-size:12px;font-weight:700;color:var(--c-t2);min-width:40px;text-align:right}

/* 플레이어 바디 */
.player-body{
  grid-row:2;display:flex;overflow:hidden;
}

/* 비디오 컬럼 */
.video-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}

/* 동기화 오버레이 */
.sync-overlay{
  position:absolute;bottom:8px;right:10px;
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  padding:4px 10px;border-radius:var(--r-f);pointer-events:none;
}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--c-green);animation:pulse .9s infinite}
.sync-text{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:1px}

/* 에러 오버레이 */
.err-layer{
  display:none;position:absolute;inset:0;z-index:20;
  background:rgba(0,0,0,.88);flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.err-layer.on{display:flex}
.err-title{font-size:15px;font-weight:800}
.err-desc{font-size:12px;color:var(--c-t2);text-align:center;max-width:240px;line-height:1.6}
.err-next-btn{
  margin-top:4px;padding:10px 24px;border-radius:var(--r-f);
  background:var(--c-accent);font-size:13px;font-weight:700;
}

/* 채널 정보 바 (비디오 아래) */
.ch-info-bar{
  padding:12px 16px 10px;background:var(--c-s0);
  border-bottom:1px solid var(--c-border-s);flex-shrink:0;
}
.ch-kw-tag{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--c-accent);background:var(--c-accent-d);border:1px solid rgba(255,51,86,.2);
  padding:2px 10px;border-radius:var(--r-f);margin-bottom:6px;
}
.ch-title{font-size:16px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-sub{font-size:11px;color:var(--c-t2)}
.progress-track{height:2px;background:var(--c-s3);border-radius:2px;margin-top:8px}
.progress-fill{height:100%;background:var(--c-accent);border-radius:2px;transition:width .8s linear}

/* 사이드바 */
.sidebar{
  width:0;overflow:hidden;display:flex;flex-direction:column;
  background:var(--c-s0);border-left:1px solid var(--c-border-s);
  transition:width .28s cubic-bezier(.4,0,.2,1);
}
.sidebar.open{width:320px}

.sidebar-tabs{
  display:flex;border-bottom:1px solid var(--c-border-s);flex-shrink:0;
}
.stab{
  flex:1;height:44px;font-size:13px;font-weight:600;
  color:var(--c-t2);border-bottom:2px solid transparent;transition:all .15s;
}
.stab.active{color:var(--c-text);border-bottom-color:var(--c-accent)}

.tab-pane{display:none;flex-direction:column;flex:1;overflow:hidden}
.tab-pane.active{display:flex}

/* EPG */
.epg-list{flex:1;overflow-y:auto;padding:12px 0}
.epg-list::-webkit-scrollbar{width:3px}
.epg-list::-webkit-scrollbar-track{background:transparent}
.epg-list::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:3px}
.epg-row{
  display:flex;gap:12px;padding:10px 16px;cursor:pointer;
  border-bottom:1px solid var(--c-border-s);transition:background .12s;
}
.epg-row:last-child{border:none}
.epg-row:hover{background:var(--c-s1)}
.epg-time{font-size:11px;color:var(--c-t3);width:38px;flex-shrink:0;padding-top:2px;font-variant-numeric:tabular-nums}
.epg-info{flex:1;min-width:0}
.epg-ttl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.epg-dur{font-size:11px;color:var(--c-t2);margin-top:2px}
.epg-row.now .epg-time,.epg-row.now .epg-ttl{color:var(--c-accent);font-weight:700}
.epg-prog{height:2px;background:var(--c-s3);border-radius:2px;margin-top:5px}
.epg-prog-fill{height:100%;background:var(--c-accent);border-radius:2px}

/* 채팅 */
.chat-msgs{
  flex:1;overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;
}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:3px}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.chat-content{flex:1;min-width:0}
.chat-username{font-size:10px;font-weight:700;color:var(--c-t2);margin-bottom:2px}
.chat-text{font-size:13px;line-height:1.45;word-break:break-word}
.chat-time{font-size:10px;color:var(--c-t3);margin-top:2px}
.chat-own .chat-avatar{order:2}
.chat-own .chat-content{order:1;text-align:right}
.chat-own .chat-username{text-align:right}

.chat-input-row{
  padding:10px 12px;border-top:1px solid var(--c-border-s);
  display:flex;gap:8px;flex-shrink:0;
}
.chat-input{
  flex:1;height:36px;padding:0 12px;
  background:var(--c-s2);border:1px solid var(--c-border);
  border-radius:var(--r-f);font-size:13px;
  transition:border-color .2s;-webkit-appearance:none;
}
.chat-input:focus{border-color:var(--c-accent)}
.chat-input::placeholder{color:var(--c-t3)}
.chat-send-btn{
  height:36px;padding:0 14px;border-radius:var(--r-f);
  background:var(--c-accent);font-size:12px;font-weight:700;
  transition:opacity .12s;white-space:nowrap;
}
.chat-send-btn:active{opacity:.75}

/* 컨트롤 바 */
.ctrl-bar{
  grid-row:3;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;padding-bottom:var(--safe-b);
  background:var(--c-s1);border-top:1px solid var(--c-border-s);
  gap:6px;
}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-btn{
  height:40px;min-width:40px;padding:0 12px;border-radius:var(--r-md);
  background:var(--c-s2);border:1px solid var(--c-border-s);
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--c-t2);transition:all .12s;
  white-space:nowrap;
}
.ctrl-btn:hover,.ctrl-btn:active{background:var(--c-s3);color:var(--c-text)}
.ctrl-btn.accent{background:var(--c-accent-d);border-color:rgba(255,51,86,.25);color:var(--c-accent)}
.ctrl-btn.accent:hover{background:var(--c-accent);color:#fff}
.ctrl-btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.ctrl-btn.active-btn{background:var(--c-accent);border-color:var(--c-accent);color:#fff}
.live-indicator{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--c-accent)}

/* ─────────────────────────────────────────────
   ③ CAPTURE MODAL
───────────────────────────────────────────── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-bg.on{display:flex}
.modal-card{
  width:100%;max-width:520px;
  background:var(--c-s1);border:1px solid var(--c-border);
  border-radius:var(--r-xl);overflow:hidden;
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--c-border-s);
}
.modal-title{font-size:16px;font-weight:800}
.modal-close{width:32px;height:32px;border-radius:var(--r-md);background:var(--c-s2);
  display:flex;align-items:center;justify-content:center}
.modal-close svg{width:16px;height:16px;fill:var(--c-t2)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.canvas-preview-wrap{
  width:100%;border-radius:var(--r-lg);overflow:hidden;background:#000;
  position:relative;
}
#captureCanvas{width:100%;height:auto;display:block}
.meme-input-group{display:flex;flex-direction:column;gap:8px}
.meme-label{font-size:11px;font-weight:700;color:var(--c-t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.meme-input{
  height:40px;padding:0 14px;
  background:var(--c-s2);border:1px solid var(--c-border);
  border-radius:var(--r-md);font-size:14px;font-weight:700;text-align:center;
  letter-spacing:1px;transition:border-color .2s;color:var(--c-text);
  -webkit-appearance:none;
}
.meme-input:focus{border-color:var(--c-accent)}
.meme-input::placeholder{color:var(--c-t3);font-weight:400;letter-spacing:0}
.modal-actions{display:flex;gap:8px}
.dl-btn{
  flex:1;height:44px;border-radius:var(--r-lg);
  background:var(--c-accent);font-size:14px;font-weight:700;
  transition:opacity .12s;
}
.dl-btn:active{opacity:.8}
.dl-btn.secondary{background:var(--c-s2);border:1px solid var(--c-border);color:var(--c-t2)}

/* ─────────────────────────────────────────────
   TOAST
───────────────────────────────────────────── */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--c-s2);border:1px solid var(--c-border);
  padding:9px 16px;border-radius:var(--r-f);
  font-size:13px;font-weight:600;
  opacity:0;transition:all .2s;z-index:200;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─────────────────────────────────────────────
   RESPONSIVE — 데스크탑 (가로 or >=768px)
───────────────────────────────────────────── */
@media (min-width:768px),(orientation:landscape) and (min-width:600px){
  /* 홈 */
  #sHome{padding:0 40px}
  .home-header{padding:28px 0 20px}
  .brand-mark{font-size:28px}
  .headline{font-size:26px}
  .search-field{height:50px;font-size:15px}
  .search-go{width:50px;height:50px}
  .ch-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .ch-tile{padding:16px}

  /* 플레이어 */
  .player-hdr{padding:0 24px;gap:16px}
  .hdr-search-wrap{max-width:360px}
  .video-col{flex:1}
  .sidebar{width:320px!important} /* 항상 열림 */
  .ch-info-bar{display:none} /* 데스크탑은 사이드바에 표시 */

  /* 컨트롤 */
  .ctrl-bar{padding:0 24px}
  .ctrl-btn{height:42px;padding:0 14px}

  /* 모바일 전용 요소 */
  .mob-only{display:none!important}

  /* 데스크탑 전용 */
  .desk-show{display:flex!important}
}
@media not ((min-width:768px),(orientation:landscape) and (min-width:600px)){
  .sidebar{display:none!important}
  .hdr-search-wrap{display:none!important}
  .hdr-right .hdr-search-wrap{display:none!important}
  .desk-only{display:none!important}
}
</style>
</head>
<body>

<!-- SVG SPRITE (hidden) -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ic-back" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></symbol>
  <symbol id="ic-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
  <symbol id="ic-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>

// ★ 글로벌 싱크 기준점
// Date.now() = UTC 밀리초 → 전 세계 동일
// ────────────────────────────────────────
const EPOCH = (() => {
  const d = new Date();
  return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()); // 오늘 UTC 자정
})();

function calcPos(ch) {
  const total = ch.videos.reduce((s,v) => s + v.dur, 0);
  const elapsed = Math.floor((Date.now() - EPOCH) / 1000) % total;
  let acc = 0;
  for (let i = 0; i < ch.videos.length; i++) {
    if (elapsed < acc + ch.videos[i].dur)
      return { idx: i, offset: elapsed - acc, elapsed, total, vid: ch.videos[i] };
    acc += ch.videos[i].dur;
  }
  return { idx: 0, offset: 0, elapsed: 0, total, vid: ch.videos[0] };
}

// ────────────────────────────────────────
// 키워드 매칭 엔진
// ────────────────────────────────────────
function findChannel(raw) {
  if (!raw || !raw.trim()) return null;
  const q = raw.trim().toLowerCase();

  // 1단계: 정확 매칭
  for (const ch of CURATED) {
    if (ch.keywords.some(k => k === q)) return ch;
  }

  // 2단계: 포함 매칭 (입력이 키워드를 포함하거나, 키워드가 입력을 포함)
  for (const ch of CURATED) {
    if (ch.keywords.some(k => q.includes(k) || k.includes(q))) return ch;
  }

  // 3단계: key / label 매칭
  for (const ch of CURATED) {
    if (ch.key.toLowerCase().includes(q) || q.includes(ch.key.toLowerCase())) return ch;
    if (ch.label.toLowerCase().includes(q)) return ch;
  }

  // 4단계: 결정적 해시 기반 자동 채널 생성 (어떤 키워드든 동작)
  return generateCh(raw.trim());
}

function strHash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  return Math.abs(h >>> 0);
}

function generateCh(keyword) {
  const h = strHash(keyword.toLowerCase());
  // Pool을 hash 기반으로 셔플해서 고유하지만 결정적인 채널 생성
  const shuffled = [...POOL].sort((a,b) => (strHash(a.id + h) % 100) - (strHash(b.id + h) % 100));
  // 색상도 키워드에서 결정
  const hue = h % 360;
  const colors = [
    `hsl(${hue},70%,55%)`,
    `hsl(${(hue+60)%360},65%,50%)`,
    `hsl(${(hue+180)%360},60%,55%)`,
  ];
  const color = colors[h % colors.length];
  return {
    key: keyword,
    label: `${keyword} 채널`,
    color,
    icon:"ic-tv",
    keywords:[keyword.toLowerCase()],
    videos: shuffled.map((v,i) => ({...v, title:`${keyword} — ${v.title}`})),
    isGenerated: true,
  };
}

// ────────────────────────────────────────
// 상태
// ────────────────────────────────────────
let cur = null;        // 현재 채널
let curVidIdx = 0;     // 현재 영상 인덱스
let muted = true;      // 음소거 상태
let sidebarOpen = true;// 사이드바 상태
let loopTimers = [];   // 인터벌 목록
let chatInterval = null;

// ────────────────────────────────────────
// 유틸
// ────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmtHHMM = sec => {
  const ms = EPOCH + sec * 1000;
  const d  = new Date(ms);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const fmtMMSS = sec => {
  const m = Math.floor(Math.abs(sec) / 60), s = Math.abs(sec) % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
};
const nowHHMM = () => { const d = new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

function toast(msg, dur=2000) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), dur);
}

// ────────────────────────────────────────
// 홈 렌더
// ────────────────────────────────────────
function renderHome() {
  // 칩
  const chipRow = $("chipRow");
  chipRow.innerHTML = "";
  ["BTS","BLACKPINK","아이유","NewJeans","먹방","ASMR","힐링","팝송"].forEach(kw => {
    const b = document.createElement("button");
    b.className = "kw-chip"; b.textContent = kw;
    b.onclick = () => doSearch(null, kw);
    chipRow.appendChild(b);
  });

  // 채널 그리드
  const grid = $("chGrid");
  grid.innerHTML = "";
  CURATED.forEach(ch => {
    const pos = calcPos(ch);
    const card = document.createElement("div");
    card.className = "ch-tile";
    card.style.setProperty("--tile-color", ch.color);
    card.style.setProperty("--tile-color-d", ch.color+"22");
    card.innerHTML = `
      <div class="tile-icon">
        <svg style="fill:${ch.color}"><use href="#${ch.icon}"/></svg>
      </div>
      <div class="tile-meta">
        <div class="tile-name">${ch.label}</div>
        <div class="tile-now">${pos.vid.title}</div>
      </div>
      <div class="tile-badge">LIVE</div>
    `;
    card.onclick = () => openCh(ch);
    grid.appendChild(card);
  });
}

// ────────────────────────────────────────
// 검색
// ────────────────────────────────────────
function doSearch(inputId, forceKeyword) {
  const q = forceKeyword || (inputId ? $(inputId).value.trim() : "");
  if (!q) { if (inputId) $(inputId).focus(); return; }

  const ch = findChannel(q);
  if (ch) {
    openCh(ch);
    if (inputId) { $(inputId).value = ""; $(inputId).blur(); }
  }
}

// ────────────────────────────────────────
// 채널 열기 (핵심)
// ────────────────────────────────────────
function openCh(ch) {
  cur = ch;
  const pos = calcPos(ch);
  curVidIdx = pos.idx;

  // 화면 전환
  $("sHome").classList.add("off");
  $("sPlayer").classList.remove("off");
  $("errLayer").classList.remove("on");

  // 영상 로드
  loadVid(curVidIdx, pos.offset);

  // 사이드바 업데이트
  updateInfoUI(pos);
  renderEPG(ch);

  // 사이드바 열기 (데스크탑)
  $("sidebar").classList.add("open");
  sidebarOpen = true;

  // 루프 시작
  startLoops(ch);

  // 채팅 시작
  startChat(ch);
}

// ────────────────────────────────────────
// 영상 로드
// ────────────────────────────────────────
function loadVid(idx, offset) {
  if (!cur) return;
  const n = cur.videos.length;
  curVidIdx = ((idx % n) + n) % n;
  const vid = cur.videos[curVidIdx];
  const off = Math.max(0, Math.floor(offset || 0));

  const src = `https://www.youtube.com/embed/${vid.id}` +
    `?autoplay=1&mute=${muted?1:0}&start=${off}` +
    `&rel=0&modestbranding=1&playsinline=1`;

  $("vFrame").src = src;
  $("errLayer").classList.remove("on");

  // UI 즉시 갱신
  const pos = calcPos(cur);
  updateInfoUI(pos);
  updateMuteUI();
}

function updateInfoUI(pos) {
  if (!cur || !pos) return;
  const vid = cur.videos[curVidIdx] || pos.vid;
  const pct = Math.min(100, ((pos.offset / Math.max(1,vid.dur)) * 100)).toFixed(1);
  const subTxt = `${fmtHHMM(pos.elapsed)} 방송 · ${fmtMMSS(pos.offset)} 경과`;

  // 모바일
  $("infoKw").textContent    = cur.key.toUpperCase();
  $("infoTitle").textContent = vid.title;
  $("infoSub").textContent   = subTxt;
  $("infoProg").style.width  = pct + "%";

  // 사이드바
  $("sideKw").textContent    = cur.key.toUpperCase();
  $("sideTitle").textContent = vid.title;
  $("sideSub").textContent   = subTxt;
  $("sideProg").style.width  = pct + "%";

  // 싱크 표시
  $("syncText").textContent  = `전 세계 동기화 · ${fmtHHMM(pos.elapsed)}`;
}

function updateMuteUI() {
  const btn = $("muteBtn");
  const ic  = $("muteIc");
  ic.innerHTML = muted ? '<use href="#ic-mute"/>' : '<use href="#ic-vol"/>';
  btn.classList.toggle("accent", muted);
  btn.classList.toggle("active-btn", !muted);
}

// ────────────────────────────────────────
// EPG
// ────────────────────────────────────────
function renderEPG(ch) {
  const pos = calcPos(ch);
  const html = buildEPGHTML(ch, pos);
  $("mobEpgList").innerHTML  = html;
  $("sideEpgList").innerHTML = html;
  ["mobEpgList","sideEpgList"].forEach(id => {
    document.querySelectorAll(`#${id} .epg-row`).forEach(row => {
      row.onclick = () => {
        const i = +row.dataset.i;
        loadVid(i, 0);
        toast(`${ch.videos[i].title}`);
      };
    });
  });
}

function buildEPGHTML(ch, pos) {
  let acc = 0, html = "";
  ch.videos.forEach((v, i) => {
    const isCur = i === pos.idx;
    const pct   = isCur ? ((pos.offset / Math.max(1,v.dur)) * 100).toFixed(0) : 0;
    html += `<div class="epg-row${isCur?" now":""}" data-i="${i}">
      <div class="epg-time">${fmtHHMM(acc)}</div>
      <div class="epg-info">
        <div class="epg-ttl">${isCur?"▶ ":""}${v.title}</div>
        <div class="epg-dur">${Math.floor(v.dur/60)}분</div>
        ${isCur?`<div class="epg-prog"><div class="epg-prog-fill" style="width:${pct}%"></div></div>`:""}
      </div>
    </div>`;
    acc += v.dur;
  });
  return html;
}

// ────────────────────────────────────────
// 싱크 루프
// ────────────────────────────────────────
function startLoops(ch) {
  loopTimers.forEach(clearInterval);
  loopTimers = [];

  const ui = setInterval(() => {
    if (!cur) return;
    const pos = calcPos(cur);
    updateInfoUI(pos);
    $("hdrClock").textContent = nowHHMM();
  }, 1000);
  loopTimers.push(ui);

  const epg = setInterval(() => { if (cur) renderEPG(cur); }, 30000);
  loopTimers.push(epg);
}

// ────────────────────────────────────────
// 실시간 채팅
// ────────────────────────────────────────
const CHAT_USERS = [
  { name: "wave_k",    color: "#7c3aed" },
  { name: "luna.tv",   color: "#0ea5e9" },
  { name: "y_runner",  color: "#16a34a" },
  { name: "melo0916",  color: "#db2777" },
  { name: "note_fan",  color: "#d97706" },
  { name: "starfield", color: "#ea580c" },
  { name: "nxtlvl__",  color: "#8b5cf6" },
  { name: "kpop.kr",   color: "#f59e0b" },
];

const CHAT_MSGS_KO = [
  "이 노래 진짜 좋다", "방금 파트 소름...", "오늘도 여기 있네",
  "전 세계 다 같이 보는 거 신기해", "같은 장면 보는 사람?",
  "몇 번째 보는 건지 모르겠다", "이 화면 캡처해야지",
  "이 채널 최고야", "Watching from Tokyo!", "Seoul here!",
  "NYC gang", "런던에서 같이 보고 있어요", "이 노래 처음 들어봐요",
  "짤 만들기 기능 써봐야지", "소리 키워서 들어야 해",
  "진짜 TV같다", "이 앱 친구한테 공유해야겠다",
];

let chatIdx = 0;

function startChat(ch) {
  clearInterval(chatInterval);
  // 초기 메시지 5개
  const containers = ["mobChatMsgs","sideChatMsgs"];
  containers.forEach(id => $(`${id}`).innerHTML = "");
  for (let i = 0; i < 5; i++) addAutoMsg(ch);

  chatInterval = setInterval(() => addAutoMsg(ch), 2800 + Math.random() * 2000);
}

function addAutoMsg(ch) {
  const user = CHAT_USERS[Math.floor(Math.random() * CHAT_USERS.length)];
  const msg  = CHAT_MSGS_KO[chatIdx % CHAT_MSGS_KO.length];
  chatIdx++;
  const now  = nowHHMM();
  appendChat(user.name, user.color, msg, now, false);
}

function appendChat(username, color, text, time, isOwn) {
  const html = `<div class="chat-msg${isOwn?" chat-own":""}">
    <div class="chat-avatar" style="background:${color}22;color:${color}">
      ${username[0].toUpperCase()}
    </div>
    <div class="chat-content">
      <div class="chat-username" style="color:${color}">${username}</div>
      <div class="chat-text">${escHtml(text)}</div>
      <div class="chat-time">${time}</div>
    </div>
  </div>`;
  ["mobChatMsgs","sideChatMsgs"].forEach(id => {
    const el = $(id);
    if (!el) return;
    el.insertAdjacentHTML("beforeend", html);
    el.scrollTop = el.scrollHeight;
    // 최대 100개 유지
    while (el.children.length > 100) el.removeChild(el.firstChild);
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function sendChat(prefix) {
  const inputId = prefix + "ChatIn";
  const inp = $(inputId);
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  appendChat("나", "#ff3356", text, nowHHMM(), true);
}

// ────────────────────────────────────────
// 캡처 / 짤 기능
// ────────────────────────────────────────
let captureThumbUrl = "";

function openCapture() {
  if (!cur) { toast("먼저 채널을 시작하세요"); return; }
  $("memeTop").value = "";
  $("memeBot").value = "";
  $("captureModal").classList.add("on");
  const vid = cur.videos[curVidIdx];
  captureThumbUrl = `https://img.youtube.com/vi/${vid.id}/maxresdefault.jpg`;
  renderCanvas();
}

function closeCapture() {
  $("captureModal").classList.remove("on");
}

function renderCanvas() {
  if (!cur) return;
  const canvas = $("captureCanvas");
  const W = 1280, H = 720;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const topText = $("memeTop").value.trim();
  const botText = $("memeBot").value.trim();
  const vid = cur.videos[curVidIdx];

  // 배경 그라데이션
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#08080d");
  grad.addColorStop(1, "#151520");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 썸네일 로드 후 그리기
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    // 썸네일 중앙에 16:9로
    const thumbH = H * 0.65;
    const thumbW = thumbH * (16/9);
    const thumbX = (W - thumbW) / 2;
    const thumbY = (H - thumbH) / 2 - 20;

    // 썸네일 그림자
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur = 40;
    ctx.drawImage(img, thumbX, thumbY, thumbW, thumbH);
    ctx.shadowBlur = 0;

    drawOverlay(ctx, W, H, topText, botText, vid);
  };
  img.onerror = () => {
    // 썸네일 없을 때 placeholder
    ctx.fillStyle = cur.color || "#ff3356";
    ctx.globalAlpha = 0.15;
    ctx.fillRect(80, 60, W-160, H-200);
    ctx.globalAlpha = 1;
    drawOverlay(ctx, W, H, topText, botText, vid);
  };

  // 즉시 오버레이 먼저 그리기 (이미지 로딩 전)
  drawOverlay(ctx, W, H, topText, botText, vid);
  img.src = captureThumbUrl;
}

function drawOverlay(ctx, W, H, topText, botText, vid) {
  const accent = cur.color || "#ff3356";

  // 상단 텍스트 (밈 스타일)
  if (topText) {
    ctx.font = "bold 60px -apple-system,Arial,sans-serif";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 8;
    ctx.lineJoin = "round";
    ctx.strokeText(topText, W/2, 80);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(topText, W/2, 80);
  }

  // 하단 텍스트 (밈 스타일)
  if (botText) {
    ctx.font = "bold 60px -apple-system,Arial,sans-serif";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 8;
    ctx.lineJoin = "round";
    ctx.strokeText(botText, W/2, H - 110);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(botText, W/2, H - 110);
  }

  // 하단 정보 바
  const barH = 80;
  const barGrad = ctx.createLinearGradient(0, H-barH, 0, H);
  barGrad.addColorStop(0, "rgba(0,0,0,0)");
  barGrad.addColorStop(1, "rgba(8,8,13,0.95)");
  ctx.fillStyle = barGrad;
  ctx.fillRect(0, H-barH, W, barH);

  // TUNE 브랜드
  ctx.font = "bold 28px -apple-system,Arial,sans-serif";
  ctx.textAlign = "left";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("TUNE", 30, H - 28);

  // 채널 키워드
  ctx.font = "bold 18px -apple-system,Arial,sans-serif";
  ctx.fillStyle = accent;
  ctx.fillText("#" + cur.key.toUpperCase(), 110, H - 28);

  // 영상 제목
  const maxTitleW = W - 350;
  ctx.font = "500 16px -apple-system,Arial,sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  let title = vid.title;
  while (ctx.measureText(title).width > maxTitleW && title.length > 10) title = title.slice(0,-1);
  if (title !== vid.title) title += "...";
  ctx.fillText(title, 110, H - 10);

  // 타임스탬프
  ctx.font = "600 14px -apple-system,Arial,sans-serif";
  ctx.textAlign = "right";
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  ctx.fillText(nowHHMM() + " KST", W - 24, H - 20);
}

function downloadCapture() {
  renderCanvas(); // 최신 상태 한 번 더 렌더
  setTimeout(() => {
    const canvas = $("captureCanvas");
    const a = document.createElement("a");
    a.download = `TUNE_${cur?.key||"capture"}_${Date.now()}.png`;
    a.href = canvas.toDataURL("image/png");
    a.click();
    toast("PNG 다운로드 완료");
    closeCapture();
  }, 600); // 이미지 로드 대기
}

// ────────────────────────────────────────
// 컨트롤
// ────────────────────────────────────────
function goHome() {
  loopTimers.forEach(clearInterval); loopTimers = [];
  clearInterval(chatInterval);
  $("vFrame").src = "";
  $("sPlayer").classList.add("off");
  $("sHome").classList.remove("off");
  renderHome();
}

function nextVid() {
  if (!cur) return;
  loadVid(curVidIdx + 1, 0);
  toast("다음 영상");
}
function prevVid() {
  if (!cur) return;
  loadVid(curVidIdx - 1, 0);
  toast("이전 영상");
}
function nextCh() {
  const i = CURATED.findIndex(c => c.key === cur?.key);
  openCh(CURATED[(i + 1) % CURATED.length]);
}
function prevCh() {
  const i = CURATED.findIndex(c => c.key === cur?.key);
  openCh(CURATED[(i - 1 + CURATED.length) % CURATED.length]);
}
function toggleMute() {
  muted = !muted;
  if (cur) loadVid(curVidIdx, 0);
  updateMuteUI();
  toast(muted ? "음소거" : "소리 켜짐");
}
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  $("sidebar").classList.toggle("open", sidebarOpen);
}

// ────────────────────────────────────────
// 탭 전환
// ────────────────────────────────────────
function sideTab(tab, btn) {
  document.querySelectorAll(".stab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  $("sideEpgPane").classList.toggle("active",  tab === "epg");
  $("sideChatPane").classList.toggle("active", tab === "chat");
}
function mobTab(tab, btn) {
  document.querySelectorAll("#sPlayer .mob-only .stab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  $("mobEpgPane").classList.toggle("active",  tab === "epg");
  $("mobChatPane").classList.toggle("active", tab === "chat");
}

// ────────────────────────────────────────
// 키보드
// ────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (["homeQ","playerQ","mobChatIn","sideChatIn","memeTop","memeBot"]
      .includes(document.activeElement?.id)) return;
  if (e.key === "ArrowRight") nextVid();
  if (e.key === "ArrowLeft")  prevVid();
  if (e.key === "ArrowUp")    nextCh();
  if (e.key === "ArrowDown")  prevCh();
  if (e.key.toLowerCase() === "m") toggleMute();
  if (e.key === "Escape") { closeCapture(); goHome(); }
});

// Enter 키 검색
["homeQ","playerQ"].forEach(id => {
  const el = $(id);
  if (el) el.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(id); });
});
["mobChatIn","sideChatIn"].forEach(id => {
  const el = $(id);
  if (el) el.addEventListener("keydown", e => {
    if (e.key === "Enter") sendChat(id === "mobChatIn" ? "mob" : "side");
  });
});

// ────────────────────────────────────────
// 시계
// ────────────────────────────────────────
function tickClock() { $("hdrClock").textContent = nowHHMM(); }
tickClock();
setInterval(tickClock, 1000);

// ────────────────────────────────────────
// 초기화
// ────────────────────────────────────────
renderHome();
</script>
