<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>TUNE · Keyword TV</title>
<style>
/* ══════════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg:       #0d0d1a;
  --bg2:      #14142a;
  --bg3:      #1c1c35;
  --accent:   #e94560;
  --accent2:  #ff6b81;
  --text:     #ffffff;
  --muted:    #7777aa;
  --border:   rgba(255,255,255,0.07);
  --r:        14px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
}
html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════════════ */
.screen {
  position: absolute; inset: 0;
  transition: opacity .25s ease, transform .25s ease;
  overflow: hidden;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(16px); }

/* ══════════════════════════════════════════════
   HOME SCREEN  (모바일 기본 / 데스크탑 반응형)
══════════════════════════════════════════════ */
#home {
  display: flex; flex-direction: column;
  background: radial-gradient(ellipse 90% 50% at 50% -5%,
    rgba(233,69,96,.2) 0%, transparent 65%), var(--bg);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 18px calc(16px + var(--safe-b));
}
#home::-webkit-scrollbar { display: none; }

.home-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 0 24px;
  position: sticky; top: 0; z-index: 10;
  background: linear-gradient(180deg, var(--bg) 70%, transparent);
}
.logo {
  font-size: 26px; font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, #fff 20%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.live-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 800; letter-spacing: 2px;
  color: var(--accent); text-transform: uppercase;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.slogan { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 22px; }
.slogan span { color: var(--accent); }

/* 검색창 */
.search-wrap { display: flex; gap: 10px; margin-bottom: 22px; }
.search-input {
  flex: 1; height: 50px; padding: 0 16px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--text); font-size: 16px;
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-btn {
  width: 50px; height: 50px; border-radius: var(--r);
  background: var(--accent); border: none; color: white;
  font-size: 19px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s;
}
.search-btn:active { transform: scale(.92); }

/* 칩 */
.section-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
}
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
.chip {
  padding: 7px 13px; border-radius: 50px;
  background: var(--bg3); border: 1px solid var(--border);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.chip:active, .chip:hover { background: var(--accent); border-color: var(--accent); }

/* 채널 카드 — 모바일: 1열, 데스크탑: 2열 */
#channelGrid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.ch-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; border-radius: var(--r);
  background: var(--bg2); border: 1px solid var(--border);
  cursor: pointer; transition: all .15s;
  position: relative; overflow: hidden;
}
.ch-card::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
}
.ch-card:active { transform: scale(.98); background: var(--bg3); }
.ch-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.ch-meta { flex: 1; min-width: 0; }
.ch-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.ch-desc { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-badge {
  font-size: 9px; font-weight: 800; padding: 3px 7px;
  border-radius: 50px; background: rgba(233,69,96,.15);
  color: var(--accent); border: 1px solid rgba(233,69,96,.3);
  letter-spacing: 1px; flex-shrink: 0;
}

/* ══════════════════════════════════════════════
   PLAYER SCREEN
══════════════════════════════════════════════ */
#player {
  display: flex; flex-direction: column;
  background: #000;
}

/* 비디오 영역 */
.video-wrap {
  position: relative; width: 100%;
  aspect-ratio: 16/9; background: #000; flex-shrink: 0;
}
.video-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }

/* 비디오 오버레이 */
.v-overlay-top {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  background: linear-gradient(180deg, rgba(0,0,0,.65) 0%, transparent 100%);
}
.back-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,.4); border: none; color: white;
  font-size: 15px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.live-badge {
  display: flex; align-items: center; gap: 4px;
  background: var(--accent); border-radius: 50px;
  padding: 4px 9px; font-size: 10px; font-weight: 800; letter-spacing: 1px;
}

/* 싱크 표시기 */
.sync-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: flex-end;
  gap: 6px; padding: 8px 12px;
  background: linear-gradient(0deg, rgba(0,0,0,.65) 0%, transparent 100%);
}
.sync-indicator {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: rgba(255,255,255,.7);
  background: rgba(0,0,0,.3); padding: 3px 8px;
  border-radius: 50px; backdrop-filter: blur(4px);
}
.sync-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; animation: blink .8s infinite; }

/* 채널 정보 바 */
.info-bar {
  padding: 14px 18px 10px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.info-keyword {
  display: inline-block; font-size: 11px; font-weight: 700; color: var(--accent);
  background: rgba(233,69,96,.12); border: 1px solid rgba(233,69,96,.25);
  padding: 2px 9px; border-radius: 50px; margin-bottom: 6px; letter-spacing: 1px;
}
.info-title { font-size: 17px; font-weight: 800; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.info-sub { font-size: 12px; color: var(--muted); }

/* Premium 안내 */
.premium-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  background: rgba(255, 180, 0, 0.07); border-bottom: 1px solid rgba(255,180,0,.15);
  font-size: 11px; color: rgba(255,180,0,.85); flex-shrink: 0;
}
.premium-bar span { opacity: .7; }
.premium-bar a { color: #ffb400; text-decoration: none; font-weight: 700; }

/* EPG */
.epg-panel {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 12px 18px; background: var(--bg);
}
.epg-panel::-webkit-scrollbar { display: none; }
.epg-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.epg-row {
  display: flex; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .1s;
}
.epg-row:last-child { border: none; }
.epg-row:active { background: var(--bg3); }
.epg-time { font-size: 11px; color: var(--muted); width: 42px; flex-shrink: 0; padding-top: 2px; }
.epg-info { flex: 1; }
.epg-title { font-size: 13px; font-weight: 600; }
.epg-dur { font-size: 11px; color: var(--muted); margin-top: 2px; }
.epg-row.now .epg-time, .epg-row.now .epg-title { color: var(--accent); }
.progress-bar-wrap { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 5px; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s; }

/* 리모컨 */
.remote {
  display: flex; align-items: center; justify-content: space-around;
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-b));
  background: var(--bg2); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.r-btn {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.r-btn:active { transform: scale(.88); background: var(--accent); border-color: var(--accent); }
.r-btn.main { background: var(--accent); border-color: var(--accent); font-size: 19px; width: 52px; height: 52px; }
.r-btn.dim { opacity: .5; }

/* 에러 오버레이 */
.err-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,.85); z-index: 20;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 20px; text-align: center;
}
.err-overlay.show { display: flex; }
.err-btn {
  margin-top: 10px; padding: 10px 22px;
  background: var(--accent); border: none; color: white;
  border-radius: 50px; font-size: 14px; font-weight: 700; cursor: pointer;
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(20,20,40,.95); border: 1px solid var(--border);
  padding: 9px 16px; border-radius: 50px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .22s;
  z-index: 999; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════════════
   DESKTOP / 가로모드 반응형
   768px 이상이거나 가로 비율이면 웹 TV 레이아웃
══════════════════════════════════════════════ */
@media (min-width: 768px), (orientation: landscape) and (min-width: 600px) {

  /* 홈 - 2컬럼 채널 그리드 */
  #home {
    padding: 0 40px 24px;
    background:
      radial-gradient(ellipse 60% 60% at 80% 50%, rgba(233,69,96,.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 50%, rgba(74,78,200,.08) 0%, transparent 60%),
      var(--bg);
  }
  .home-header { padding: 28px 0 24px; }
  .logo { font-size: 32px; }
  .slogan { font-size: 28px; margin-bottom: 28px; }
  .search-wrap { max-width: 600px; }
  .search-input { height: 54px; font-size: 17px; border-radius: 16px; }
  .search-btn { width: 54px; height: 54px; border-radius: 16px; font-size: 21px; }
  #channelGrid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .ch-card { padding: 16px; }
  .ch-icon { width: 52px; height: 52px; font-size: 26px; }
  .ch-name { font-size: 15px; }

  /* 플레이어 - 좌우 2컬럼 레이아웃 */
  #player {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 56px 1fr 80px;
    grid-template-areas:
      "topbar  topbar"
      "video   sidebar"
      "remote  remote";
    background: var(--bg);
  }

  /* 데스크탑 상단바 */
  .desktop-topbar {
    grid-area: topbar;
    display: flex !important;
    align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .desktop-logo {
    font-size: 20px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, #fff 20%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .desktop-search-wrap { display: flex !important; gap: 8px; }
  .desktop-search-input {
    width: 280px; height: 36px; padding: 0 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 50px; color: var(--text); font-size: 14px; outline: none;
    -webkit-appearance: none;
  }
  .desktop-search-input:focus { border-color: var(--accent); }
  .desktop-search-btn {
    height: 36px; padding: 0 16px; border-radius: 50px;
    background: var(--accent); border: none; color: white;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .desktop-topbar-right { display: flex !important; align-items: center; gap: 12px; }
  .desktop-ch-nav {
    display: flex; gap: 4px;
  }
  .desktop-ch-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .desktop-ch-btn:hover { background: var(--accent); border-color: var(--accent); }

  /* 비디오 영역 */
  .video-wrap {
    grid-area: video;
    aspect-ratio: unset; height: 100%;
    background: #000;
  }

  /* 사이드바 */
  .player-sidebar {
    grid-area: sidebar;
    display: flex !important;
    flex-direction: column;
    background: var(--bg2); border-left: 1px solid var(--border);
    overflow: hidden;
  }
  .sidebar-info {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-keyword {
    font-size: 11px; font-weight: 700; color: var(--accent);
    background: rgba(233,69,96,.12); border: 1px solid rgba(233,69,96,.25);
    padding: 2px 9px; border-radius: 50px; display: inline-block;
    margin-bottom: 6px; letter-spacing: 1px;
  }
  .sidebar-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
  .sidebar-sub { font-size: 12px; color: var(--muted); }

  /* 사이드바 EPG */
  .sidebar-epg {
    flex: 1; overflow-y: auto; padding: 12px 18px;
  }
  .sidebar-epg::-webkit-scrollbar { width: 4px; }
  .sidebar-epg::-webkit-scrollbar-track { background: transparent; }
  .sidebar-epg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* 데스크탑 리모컨 */
  .remote {
    grid-area: remote;
    padding: 0 24px;
    background: var(--bg2); border-top: 1px solid var(--border);
    justify-content: flex-start; gap: 12px;
  }
  .remote-center {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .remote-right { display: flex; align-items: center; gap: 8px; }
  .r-btn { width: 44px; height: 44px; font-size: 16px; }
  .r-btn.main { width: 44px; height: 44px; }

  /* 모바일 전용 요소 숨김 */
  .mobile-only { display: none !important; }
}

/* 모바일에서 숨길 데스크탑 전용 요소 */
.desktop-topbar { display: none; }
.desktop-search-wrap { display: none; }
.desktop-topbar-right { display: none; }
.player-sidebar { display: none; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════ -->
<!--  HOME SCREEN                             -->
<!-- ════════════════════════════════════════ -->
<div id="home" class="screen">
  <div class="home-header">
    <div class="logo">TUNE</div>
    <div class="live-pill"><div class="dot"></div>LIVE</div>
  </div>

  <div class="slogan">키워드 하나로<br/><span>나만의 24시간 채널</span></div>

  <div class="search-wrap">
    <input class="search-input" id="homeSearch" type="text"
      placeholder="BTS, 아이유, 먹방, ASMR..." autocomplete="off" />
    <button class="search-btn" onclick="doSearch('homeSearch')">▶</button>
  </div>

  <div class="section-label">🔥 인기 채널</div>
  <div class="chips" id="chips"></div>
  <div class="section-label">📺 전체 채널</div>
  <div id="channelGrid"></div>
</div>

<!-- ════════════════════════════════════════ -->
<!--  PLAYER SCREEN                           -->
<!-- ════════════════════════════════════════ -->
<div id="player" class="screen hidden">

  <!-- 데스크탑 상단바 (가로 모드에서만 표시) -->
  <div class="desktop-topbar">
    <div class="desktop-logo">TUNE</div>
    <div class="desktop-search-wrap">
      <input class="desktop-search-input" id="desktopSearch" type="text"
        placeholder="키워드 검색..." autocomplete="off" />
      <button class="desktop-search-btn" onclick="doSearch('desktopSearch')">▶ 채널 변경</button>
    </div>
    <div class="desktop-topbar-right">
      <div class="live-pill"><div class="dot"></div>LIVE SYNC</div>
      <div class="desktop-ch-nav">
        <button class="desktop-ch-btn" onclick="prevCh()" title="이전 채널">◀</button>
        <button class="desktop-ch-btn" onclick="nextCh()" title="다음 채널">▶</button>
      </div>
    </div>
  </div>

  <!-- 비디오 + 사이드바 영역 -->
  <div class="video-wrap">
    <iframe id="videoFrame"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

    <!-- 모바일 오버레이 상단 -->
    <div class="v-overlay-top mobile-only">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="live-badge"><div class="dot"></div>LIVE</div>
    </div>

    <!-- 싱크 표시기 -->
    <div class="sync-bar">
      <div class="sync-indicator" id="syncIndicator">
        <div class="sync-dot"></div>
        <span id="syncText">전 세계 동기화됨</span>
      </div>
    </div>

    <!-- 에러 오버레이 -->
    <div class="err-overlay" id="errOverlay">
      <div style="font-size:36px">😅</div>
      <div style="font-size:15px;font-weight:800">영상 재생 실패</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">이 영상은 임베드가 제한돼 있어요.</div>
      <button class="err-btn" onclick="nextVideo()">다음 영상 ▶</button>
    </div>
  </div>

  <!-- 사이드바 (데스크탑) -->
  <div class="player-sidebar">
    <div class="sidebar-info">
      <div class="sidebar-keyword" id="sideKeyword">#키워드</div>
      <div class="sidebar-title" id="sideTitle">영상 제목</div>
      <div class="sidebar-sub" id="sideSub">방송 중</div>
      <div style="margin-top:8px">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="sideProgress" style="width:0%"></div>
        </div>
      </div>
    </div>
    <!-- Premium 안내 -->
    <div style="padding:8px 18px;font-size:11px;color:rgba(255,180,0,.8);border-bottom:1px solid var(--border);background:rgba(255,180,0,.05)">
      ⭐ <a href="https://www.youtube.com/premium" target="_blank" style="color:#ffb400;font-weight:700">YouTube Premium</a> 사용자는 YouTube에 로그인하면 광고 없이 시청돼요.
    </div>
    <div class="sidebar-epg" id="sideEPG"></div>
  </div>

  <!-- 모바일 채널 정보 -->
  <div class="info-bar mobile-only">
    <div class="info-keyword" id="mobileKeyword">#키워드</div>
    <div class="info-title" id="mobileTitle">영상 제목</div>
    <div class="info-sub" id="mobileSub">방송 중</div>
    <!-- 진행 바 -->
    <div class="progress-bar-wrap" style="margin-top:8px">
      <div class="progress-bar-fill" id="mobileProgress" style="width:0%"></div>
    </div>
  </div>

  <!-- 모바일 Premium 안내 -->
  <div class="premium-bar mobile-only">

//  ★ 핵심 싱크 로직 ★
//  전 세계 어디서든 같은 키워드 = 같은 장면
//
//  원리:
//  - STARTED_AT = 오늘 UTC 자정 (전 세계 동일 기준점)
//  - elapsed = (지금 UTC 시각 - 기준점) / 1000 초
//  - 채널 총 길이로 나눈 나머지 = 현재 위치
//  - Date.now()는 UTC밀리초 = 서울이든 뉴욕이든 동일
// ══════════════════════════════════════════
const STARTED_AT = (() => {
  const d = new Date();
  return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
})();

function computePosition(channel) {
  const totalDur = channel.videos.reduce((s, v) => s + v.dur, 0);
  // Date.now() = UTC 밀리초. 시간대 무관. 전 세계 동일값.
  const elapsed = Math.floor((Date.now() - STARTED_AT) / 1000) % totalDur;
  let acc = 0;
  for (let i = 0; i < channel.videos.length; i++) {
    if (elapsed < acc + channel.videos[i].dur) {
      return {
        videoIdx: i,
        offset: elapsed - acc,       // 이 영상 안에서의 초 위치
        elapsed: elapsed,            // 채널 전체에서의 초 위치
        totalDur,
        video: channel.videos[i]
      };
    }
    acc += channel.videos[i].dur;
  }
  return { videoIdx: 0, offset: 0, elapsed: 0, totalDur, video: channel.videos[0] };
}

// ══════════════════════════════════════════
//  상태
// ══════════════════════════════════════════
let curChannel  = null;
let curVideoIdx = 0;
let isMuted     = true;
let syncTimers  = [];

// ══════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════
const $ = id => document.getElementById(id);

function showToast(msg) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2000);
}

function fmtMMSS(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtHHMM(sec) {
  // 오늘 UTC 자정 기준으로 시각 계산
  const ms = STARTED_AT + sec * 1000;
  const d = new Date(ms);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
//  홈 렌더
// ══════════════════════════════════════════
function renderHome() {
  // 칩
  $("chips").innerHTML = "";
  CHANNELS.forEach(ch => {
    const el = document.createElement("div");
    el.className = "chip";
    el.textContent = ch.emoji + " " + ch.key;
    el.onclick = () => openChannel(ch);
    $("chips").appendChild(el);
  });

  // 채널 카드
  $("channelGrid").innerHTML = "";
  CHANNELS.forEach(ch => {
    const pos = computePosition(ch);
    const card = document.createElement("div");
    card.className = "ch-card";
    card.innerHTML = `
      <style>.ch-card[data-key="${ch.key}"]::before{background:${ch.accent}}</style>
      <div class="ch-icon" style="background:${ch.accent}20">${ch.emoji}</div>
      <div class="ch-meta">
        <div class="ch-name">${ch.label}</div>
        <div class="ch-desc">▶ ${pos.video.title}</div>
      </div>
      <div class="ch-badge">LIVE</div>
    `;
    card.dataset.key = ch.key;
    card.onclick = () => openChannel(ch);
    $("channelGrid").appendChild(card);
  });
}

// ══════════════════════════════════════════
//  검색
// ══════════════════════════════════════════
function doSearch(inputId) {
  const q = $(inputId).value.trim();
  if (!q) { $(inputId).focus(); return; }
  const lo = q.toLowerCase();
  const match = CHANNELS.find(ch =>
    ch.key.toLowerCase().includes(lo) || lo.includes(ch.key.toLowerCase())
  );
  if (match) {
    openChannel(match);
  } else {
    // 키워드 임시 채널 생성
    openChannel({
      key: q, label: `#${q} 채널`, emoji: "📺", accent: "#e94560",
      desc: `"${q}" 관련 영상`,
      videos: [
        { id: "M7lc1UVf-VE", title: `${q} #1`, dur: 600 },
        { id: "JGwWNGJdvx8", title: `${q} #2`, dur: 234 },
        { id: "2Vv-BfVoq4g", title: `${q} #3`, dur: 229 },
      ]
    });
  }
  $(inputId).blur();
  $(inputId).value = "";
}

// ══════════════════════════════════════════
//  채널 열기
// ══════════════════════════════════════════
function openChannel(channel) {
  curChannel = channel;
  const pos = computePosition(channel);
  curVideoIdx = pos.videoIdx;

  // 화면 전환
  $("home").classList.add("hidden");
  $("player").classList.remove("hidden");
  $("errOverlay").classList.remove("show");

  loadVideo(curVideoIdx, pos.offset, pos);
  renderEPG(channel);
  startSyncLoop();
}

// ══════════════════════════════════════════
//  영상 로드 (핵심: iframe src 직접 교체)
// ══════════════════════════════════════════
function loadVideo(idx, offset, posOverride) {
  if (!curChannel) return;
  curVideoIdx = ((idx % curChannel.videos.length) + curChannel.videos.length) % curChannel.videos.length;
  const vid = curChannel.videos[curVideoIdx];
  const off = Math.floor(offset || 0);

  const src = `https://www.youtube.com/embed/${vid.id}` +
    `?autoplay=1&mute=${isMuted ? 1 : 0}&start=${off}` +
    `&rel=0&modestbranding=1&playsinline=1`;
  $("videoFrame").src = src;

  // UI 업데이트
  updateInfoUI(vid, posOverride);
}

function updateInfoUI(vid, pos) {
  if (!curChannel) return;
  if (!pos) pos = computePosition(curChannel);
  const progress = ((pos.offset / vid.dur) * 100).toFixed(1);
  const subText = `${fmtHHMM(pos.elapsed)} 방송 중 · ${fmtMMSS(pos.offset)} / ${fmtMMSS(vid.dur)}`;

  // 모바일
  $("mobileKeyword").textContent = `#${curChannel.key}`;
  $("mobileTitle").textContent = vid.title;
  $("mobileSub").textContent = subText;
  $("mobileProgress").style.width = progress + "%";

  // 데스크탑 사이드바
  $("sideKeyword").textContent = `#${curChannel.key}`;
  $("sideTitle").textContent = vid.title;
  $("sideSub").textContent = subText;
  $("sideProgress").style.width = progress + "%";

  $("muteBtn").textContent = isMuted ? "🔇" : "🔊";
  $("muteBtn").classList.toggle("dim", isMuted);
}

// ══════════════════════════════════════════
//  EPG 렌더
// ══════════════════════════════════════════
function renderEPG(channel) {
  const pos = computePosition(channel);
  const html = buildEPGHTML(channel, pos);
  $("mobileEPGList").innerHTML = html;
  $("sideEPG").innerHTML = `<div class="epg-label">편성표</div>` + html;

  // 이벤트 달기
  ["mobileEPGList","sideEPG"].forEach(id => {
    document.querySelectorAll(`#${id} .epg-row`).forEach(row => {
      row.onclick = () => {
        const i = parseInt(row.dataset.idx);
        loadVideo(i, 0);
        showToast(`▶ ${channel.videos[i].title}`);
      };
    });
  });
}

function buildEPGHTML(channel, pos) {
  let html = "";
  let acc = 0;
  channel.videos.forEach((v, i) => {
    const isCurrent = i === pos.videoIdx;
    const progress = isCurrent ? ((pos.offset / v.dur) * 100).toFixed(0) : 0;
    html += `
      <div class="epg-row${isCurrent ? " now" : ""}" data-idx="${i}">
        <div class="epg-time">${fmtHHMM(acc)}</div>
        <div class="epg-info">
          <div class="epg-title">${isCurrent ? "▶ " : ""}${v.title}</div>
          <div class="epg-dur">${Math.floor(v.dur/60)}분</div>
          ${isCurrent ? `<div class="progress-bar-wrap" style="margin-top:4px"><div class="progress-bar-fill" style="width:${progress}%"></div></div>` : ""}
        </div>
      </div>`;
    acc += v.dur;
  });
  return html;
}

// ══════════════════════════════════════════
//  싱크 루프 (30초마다 재동기화)
// ══════════════════════════════════════════
function startSyncLoop() {
  syncTimers.forEach(clearInterval);
  syncTimers = [];

  // 1초마다 UI 업데이트
  const uiTimer = setInterval(() => {
    if (!curChannel) return;
    const pos = computePosition(curChannel);
    updateInfoUI(curChannel.videos[pos.videoIdx], pos);
    updateSyncIndicator(pos);
    updateClock();
  }, 1000);
  syncTimers.push(uiTimer);

  // 30초마다 EPG 새로고침
  const epgTimer = setInterval(() => {
    if (curChannel) renderEPG(curChannel);
  }, 30000);
  syncTimers.push(epgTimer);
}

function updateSyncIndicator(pos) {
  const utcSec = Math.floor((Date.now() - STARTED_AT) / 1000);
  $("syncText").textContent = `전 세계 동기화 · ${fmtHHMM(pos.elapsed)}`;
}

function updateClock() {
  const d = new Date();
  $("clockDisplay").textContent =
    `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
//  컨트롤
// ══════════════════════════════════════════
function goHome() {
  syncTimers.forEach(clearInterval); syncTimers = [];
  $("videoFrame").src = "";
  $("player").classList.add("hidden");
  $("home").classList.remove("hidden");
  renderHome();
}

function nextVideo() {
  if (!curChannel) return;
  loadVideo(curVideoIdx + 1, 0);
  showToast("▶ 다음 영상");
}
function prevVideo() {
  if (!curChannel) return;
  loadVideo(curVideoIdx - 1, 0);
  showToast("◀ 이전 영상");
}
function nextCh() {
  const i = CHANNELS.findIndex(c => c.key === curChannel?.key);
  openChannel(CHANNELS[(i + 1) % CHANNELS.length]);
  showToast(`⏭ ${CHANNELS[(i + 1) % CHANNELS.length].label}`);
}
function prevCh() {
  const i = CHANNELS.findIndex(c => c.key === curChannel?.key);
  openChannel(CHANNELS[(i - 1 + CHANNELS.length) % CHANNELS.length]);
  showToast(`⏮ ${CHANNELS[(i - 1 + CHANNELS.length) % CHANNELS.length].label}`);
}
function toggleMute() {
  isMuted = !isMuted;
  if (curChannel) loadVideo(curVideoIdx, 0);
  showToast(isMuted ? "🔇 음소거" : "🔊 소리 켜짐");
}

// ══════════════════════════════════════════
//  키보드 단축키
// ══════════════════════════════════════════
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") nextVideo();
  if (e.key === "ArrowLeft")  prevVideo();
  if (e.key === "ArrowUp")    nextCh();
  if (e.key === "ArrowDown")  prevCh();
  if (e.key === "m" || e.key === "M") toggleMute();
  if (e.key === "Escape") goHome();
});

["homeSearch","desktopSearch"].forEach(id => {
  const el = $(id);
  if (el) el.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(id); });
});

// 시작
renderHome();
updateClock();
setInterval(updateClock, 1000);
</script>
